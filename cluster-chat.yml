# ============================================================
# Cluster Chat — Docker Swarm Compose Yaml
# ============================================================

services:
  cluster-chat:
    image: registry.cluster.home/cluster-chat:local
    networks:
      - swarm-net
    environment:
      # Trust the internal step-ca so PHP curl can reach *.cluster.home HTTPS
      - CURL_CA_BUNDLE=/certs/cluster-home-root.crt
      - SSL_CERT_FILE=/certs/cluster-home-root.crt
    volumes:
      # Persistent DB + uploads — NFS-backed so it survives rescheduling
      - /mnt/docker-data/cluster-chat:/data
      # Internal CA cert
      - /mnt/docker-data/step-ca/certs/root_ca.crt:/certs/cluster-home-root.crt:ro
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.cluster-chat.rule=Host(`chat.cluster.home`)"
        - "traefik.http.routers.cluster-chat.entrypoints=websecure"
        - "traefik.http.routers.cluster-chat.tls=true"
        - "traefik.http.routers.cluster-chat.tls.certresolver=step"
        - "traefik.http.services.cluster-chat-svc.loadbalancer.server.port=80"
        - "traefik.http.routers.cluster-chat.service=cluster-chat-svc"

        # SSE: X-Accel-Buffering: no header (sent by stream.php) tells Traefik
        # not to buffer. The buffering middleware is NOT used here — maxResponseBodyBytes=0
        # means unlimited buffering in Traefik, which is the opposite of what we want.

networks:
  swarm-net:
    name: swarm-net
    external: true
